<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAMU</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f7f7f7;
}

header {
  background: #111;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

nav {
  display: flex;
  overflow-x: auto;
  background: white;
  padding: 10px;
}

nav button {
  margin: 5px;
  padding: 10px;
  border: none;
  background: #eee;
  border-radius: 10px;
  cursor: pointer;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  padding: 10px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button.add {
  width: 100%;
  margin-top: 5px;
  background: black;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 8px;
}

.cart {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background: black;
  color: white;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>HAMU - Catálogo</header>

<nav>
<button onclick="filter('Ropa')">Ropa</button>
<button onclick="filter('Postres por pedido')">Por pedido</button>
<button onclick="filter('Postres disponibles')">Disponibles</button>
<button onclick="filter('Memoriales')">Memoriales</button>
<button onclick="filter('Artesanías')">Artesanías</button>
</nav>

<div class="container" id="productos"></div>

<div class="cart" onclick="sendWhatsApp()">
🛒 Ver carrito (<span id="count">0</span>)
</div>

<script>
const productos = [
  {name:"Vestido floral", price:250, category:"Ropa", img:"https://via.placeholder.com/150"},
  {name:"Brownies", price:50, category:"Postres disponibles", img:"https://via.placeholder.com/150"},
  {name:"Pulsera artesanal", price:80, category:"Artesanías", img:"https://via.placeholder.com/150"},
];

let cart = [];

function show(category){
  let html = "";
  productos
  .filter(p => p.category === category)
  .forEach((p, i) => {
    html += `
      <div class="card">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>$${p.price}</p>
        <button class="add" onclick="add(${i})">Agregar</button>
      </div>
    `;
  });
  document.getElementById("productos").innerHTML = html;
}

function filter(cat){
  show(cat);
}

function add(i){
  cart.push(productos[i]);
  document.getElementById("count").innerText = cart.length;
}

function sendWhatsApp(){
  let msg = "Hola, quiero hacer este pedido:%0A";
  cart.forEach(p=>{
    msg += `- ${p.name} $${p.price}%0A`;
  });
  let url = "https://wa.me/TUNUMERO?text=" + msg;
  window.open(url,"_blank");
}

show("Ropa");
</script>

</body>
</html>
